<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proyecto 5 - Galería de Imágenes con Lightbox | Daniel Mira</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #1e293b;
      --primary: #8b5cf6;
      --gray: #64748b;
      --overlay: rgba(0,0,0,0.9);
    }
    [data-theme="dark"] {
      --bg: #0f172a;
      --card: #1e293b;
      --text: #e2e8f0;
      --overlay: rgba(15,23,42,0.95);
    }
    body {
      font-family: 'Poppins', sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 0;
      min-height: 100vh;
      transition: all 0.5s;
    }
    .container {
      max-width: 1400px;
      margin: 4rem auto 2rem;
      padding: 0 1.5rem;
    }
    header {
      text-align: center;
      margin-bottom: 3rem;
    }
    h1 {
      font-size: 2.8rem;
      font-weight: 700;
      color: var(--primary);
    }
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
    }
    .gallery-item {
      position: relative;
      overflow: hidden;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.12);
      cursor: pointer;
      transition: all 0.4s ease;
    }
    .gallery-item:hover {
      transform: translateY(-12px);
      box-shadow: 0 25px 60px rgba(0,0,0,0.2);
    }
    .gallery-item img {
      width: 100%;
      height: 280px;
      object-fit: cover;
      display: block;
      transition: transform 0.6s ease;
    }
    .gallery-item:hover img {
      transform: scale(1.12);
    }
    .overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: var(--overlay);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.4s ease;
    }
    .overlay.active {
      opacity: 1;
      visibility: visible;
    }
    .lightbox {
      position: relative;
      max-width: 90%;
      max-height: 90vh;
    }
    .lightbox img {
      max-width: 100%;
      max-height: 85vh;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }
    .close-btn {
      position: absolute;
      top: -40px;
      right: -40px;
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      font-size: 2.5rem;
      cursor: pointer;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
    }
    .close-btn:hover {
      background: rgba(255,255,255,0.4);
      transform: rotate(90deg);
    }
    .nav-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.5);
      border: none;
      color: white;
      font-size: 3rem;
      cursor: pointer;
      padding: 0.5rem 1rem;
      border-radius: 50%;
      transition: all 0.3s;
    }
    .nav-btn:hover {
      background: rgba(0,0,0,0.7);
    }
    .prev { left: 2rem; }
    .next { right: 2rem; }
    .theme-toggle {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      background: var(--card);
      border: none;
      border-radius: 50%;
      width: 48px;
      height: 48px;
      font-size: 1.6rem;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      z-index: 100;
    }
    @media (max-width: 768px) {
      .gallery { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
      .nav-btn { font-size: 2.5rem; }
      .prev { left: 1rem; }
      .next { right: 1rem; }
      .close-btn { top: -30px; right: -30px; width: 40px; height: 40px; font-size: 2rem; }
    }
  </style>
</head>
<body>

  <button class="theme-toggle" onclick="toggleTheme()">🌙</button>

  <div class="container">
    <header>
      <h1>Galería de Imágenes</h1>
      <p>Haz clic en cualquier foto para verla en grande</p>
    </header>

    <div class="gallery" id="gallery">
      <!-- Las imágenes se agregan aquí dinámicamente o manualmente -->
    </div>
  </div>

  <!-- Lightbox -->
  <div class="overlay" id="lightbox">
    <button class="close-btn" onclick="closeLightbox()">×</button>
    <button class="nav-btn prev" onclick="prevImage()">‹</button>
    <button class="nav-btn next" onclick="nextImage()">›</button>
    <div class="lightbox">
      <img id="lightboxImg" src="" alt="Imagen ampliada">
    </div>
  </div>

  <script>
    const images = [
      { src: 'imagenes/1.jpg', alt: 'Paisajes hermosos' },
      { src: 'imagenes/2.jpg', alt: 'Paisajes hermosos' },
      { src: 'imagenes/3.jpg', alt: 'Paisajes hermosos' },
      { src: 'imagenes/4.jpg', alt: 'Paisajes hermosos' },
      { src: 'imagenes/5.jpg', alt: 'Paisajes hermosos' },
      { src: 'imagenes/6.jpg', alt: 'Paisajes hermosos' },
      { src: 'imagenes/7.jpg', alt: 'Paisajes hermosos' },
      { src: 'imagenes/8.jpg', alt: 'Paisajes hermosos' },
      { src: 'imagenes/9.jpg', alt: 'Paisajes hermosos' },
      { src: 'imagenes/10.jpg', alt: 'Paisajes hermosos' },

      
      // Agrega más fotos aquí (puedes poner las tuyas en la carpeta imagenes/)
      // Ej: { src: 'imagenes/tu-foto.jpg', alt: 'Descripción' }
    ];

    const gallery = document.getElementById('gallery');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightboxImg');
    let currentIndex = 0;

    // Renderizar galería
    images.forEach((img, index) => {
      const item = document.createElement('div');
      item.className = 'gallery-item';
      item.innerHTML = `<img src="${img.src}" alt="${img.alt}" loading="lazy">`;
      item.onclick = () => openLightbox(index);
      gallery.appendChild(item);
    });

    function openLightbox(index) {
      currentIndex = index;
      lightboxImg.src = images[index].src;
      lightboxImg.alt = images[index].alt;
      lightbox.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      lightbox.classList.remove('active');
      document.body.style.overflow = 'auto';
    }

    function prevImage() {
      currentIndex = (currentIndex - 1 + images.length) % images.length;
      lightboxImg.src = images[currentIndex].src;
      lightboxImg.alt = images[currentIndex].alt;
    }

    function nextImage() {
      currentIndex = (currentIndex + 1) % images.length;
      lightboxImg.src = images[currentIndex].src;
      lightboxImg.alt = images[currentIndex].alt;
    }

    function toggleTheme() {
      document.body.dataset.theme = document.body.dataset.theme === 'dark' ? '' : 'dark';
      localStorage.setItem('galleryTheme', document.body.dataset.theme);
    }

    // Cerrar con ESC
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeLightbox();
      if (lightbox.classList.contains('active')) {
        if (e.key === 'ArrowLeft') prevImage();
        if (e.key === 'ArrowRight') nextImage();
      }
    });

    // Cerrar clic fuera de imagen
    lightbox.addEventListener('click', e => {
      if (e.target === lightbox) closeLightbox();
    });

    if (localStorage.getItem('galleryTheme') === 'dark') {
      document.body.dataset.theme = 'dark';
    }
  </script>

</body>
</html>
